<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #3b99ff;
            --muted: #a0a0a0;
            --border: #2d2d2d;
            --danger: #ff6b6b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        #timer {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent);
            margin: 0.5rem 0;
        }

        #eta {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        #message {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .url-display {
            font-size: 0.85rem;
            color: var(--muted);
            word-break: break-all;
            margin-bottom: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none; /* 連続タップ時のテキスト選択を防ぐ */
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: var(--danger);
        }
        
        /* PIN入力オーバーレイのスタイル */
        #pin-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .pin-box {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .pin-display {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            font-weight: bold;
            margin: 1rem 0;
            color: var(--danger);
        }
        input[type="text"] {
            font-size: 1.5rem;
            text-align: center;
            width: 150px;
            padding: 0.5rem;
            margin-bottom: 1rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .btn-group button {
            padding: 0.5rem 1rem;
            margin: 0 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 6px;
        }
        .btn-cancel {
            background: var(--muted);
            color: white;
        }
        .btn-submit {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="app">
            <h1 id="status">リダイレクト準備中</h1>
            <div id="timer">--</div>
            <div id="eta"></div>
            <p id="message">まもなく指定のURLへ移動します</p>
            <div class="url-display" id="url-display"></div>
            <!-- hrefは#にし、クリックイベントをJavaScriptで制御 -->
            <a id="manual-link" href="#" style="display:none;">今すぐ移動する</a>
        </div>
    </div>

    <!-- PIN入力用オーバーレイ -->
    <div id="pin-overlay">
        <div class="pin-box">
            <h3>手動リダイレクトの確認</h3>
            <p>以下の4桁のPINを入力してください</p>
            <div class="pin-display" id="expected-pin">0000</div>
            <input type="text" id="pin-input" maxlength="4" autocomplete="off" inputmode="numeric">
            <div class="btn-group">
                <button class="btn-cancel" id="pin-cancel">キャンセル</button>
                <button class="btn-submit" id="pin-submit">移動する</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const statusEl = document.getElementById('status');
            const timerEl = document.getElementById('timer');
            const etaEl = document.getElementById('eta');
            const messageEl = document.getElementById('message');
            const urlDisplayEl = document.getElementById('url-display');
            const linkEl = document.getElementById('manual-link');

            function showError(msg) {
                statusEl.textContent = 'Error';
                statusEl.classList.add('error');
                messageEl.textContent = msg;
                timerEl.textContent = '×';
                etaEl.textContent = '';
                urlDisplayEl.textContent = '';
                linkEl.style.display = 'none';
            }

            function formatTimeDisplay(totalSeconds) {
                if (totalSeconds <= 0) return "0秒";
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                
                let result = "";
                if (h > 0) result += h + "時間 ";
                if (m > 0 || h > 0) result += m + "分 ";
                result += s + "秒";
                
                return result.trim();
            }

            // ==========================================
            // フェーズ2: カウントダウンの実行
            // ==========================================
            if (params.has('now') && params.has('time') && params.has('redirectto')) {
                const startUnix = parseInt(params.get('now'), 10);
                const waitTime = parseInt(params.get('time'), 10);
                const targetUrl = decodeURIComponent(params.get('redirectto'));

                if (isNaN(startUnix) || isNaN(waitTime) || !targetUrl) {
                    showError('エラー: 不正なパラメータです。');
                    return;
                }

                const targetUnix = startUnix + waitTime;
                
                const targetDate = new Date(targetUnix * 1000);
                const dateOptions = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
                etaEl.textContent = `終了予定: ${targetDate.toLocaleString('ja-JP', dateOptions)}`;

                urlDisplayEl.textContent = `移動先: ${targetUrl}`;
                linkEl.style.display = 'inline-block';

                // --- 誤爆防止: 3回連続タップ & PIN入力ロジック ---
                let clickCount = 0;
                let clickTimer = null;
                let currentPin = '';

                const overlay = document.getElementById('pin-overlay');
                const expectedPinEl = document.getElementById('expected-pin');
                const pinInputEl = document.getElementById('pin-input');
                const btnCancel = document.getElementById('pin-cancel');
                const btnSubmit = document.getElementById('pin-submit');

                linkEl.addEventListener('click', function(e) {
                    e.preventDefault(); // 通常のリンク遷移を無効化
                    clickCount++;

                    if (clickCount >= 3) {
                        // 3回タップ達成
                        clearTimeout(clickTimer);
                        clickCount = 0;
                        showPinOverlay();
                    } else {
                        // 1秒以内に次のタップがなければカウントリセット
                        clearTimeout(clickTimer);
                        clickTimer = setTimeout(() => {
                            clickCount = 0;
                        }, 1000);
                    }
                });

                function showPinOverlay() {
                    // 0000〜9999のランダムな4桁を生成
                    currentPin = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                    expectedPinEl.textContent = currentPin;
                    pinInputEl.value = '';
                    overlay.style.display = 'flex';
                    pinInputEl.focus();
                }

                function hidePinOverlay() {
                    overlay.style.display = 'none';
                    currentPin = '';
                }

                btnCancel.addEventListener('click', hidePinOverlay);

                btnSubmit.addEventListener('click', function() {
                    if (pinInputEl.value === currentPin) {
                        window.location.replace(targetUrl);
                    } else {
                        alert('PINが一致しません。');
                        pinInputEl.value = '';
                        pinInputEl.focus();
                    }
                });

                // Enterキーで送信
                pinInputEl.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        btnSubmit.click();
                    }
                });
                // ------------------------------------------------

                function updateTimer() {
                    const currentUnix = Math.floor(Date.now() / 1000);
                    const remaining = targetUnix - currentUnix;

                    if (remaining <= 0) {
                        timerEl.textContent = '0秒';
                        etaEl.textContent = '';
                        statusEl.textContent = '移動中...';
                        window.location.replace(targetUrl);
                    } else {
                        statusEl.textContent = 'リダイレクト待機中';
                        timerEl.textContent = formatTimeDisplay(remaining);
                        setTimeout(updateTimer, 500); 
                    }
                }
                updateTimer();
                return;
            }

            // ==========================================
            // フェーズ1: パラメータの初期化と再転送
            // ==========================================
            if (params.has('url')) {
                const encodedUrl = params.get('url');
                const idParam = params.get('id');
                
                function parseTime(timeStr) {
                    if (!timeStr) return 0;
                    const match = timeStr.toLowerCase().match(/^(\d+)(h|m|s)?$/);
                    if (match) {
                        const val = parseInt(match[1], 10);
                        const unit = match[2];
                        if (unit === 'h') return val * 3600;
                        if (unit === 'm') return val * 60;
                        return val;
                    }
                    return parseInt(timeStr.replace(/[^0-9]/g, '')) || 0;
                }

                const baseTime = parseTime(params.get('t') || '0s');
                const randVal = parseTime(params.get('rand'));
                const randPVal = params.has('randp') ? parseTime(params.get('randp')) : randVal;
                const randNVal = params.has('randn') ? parseTime(params.get('randn')) : randVal;
                
                let calculatedTime = baseTime;
                
                if (randPVal > 0 || randNVal > 0) {
                    const fluctuation = Math.floor(Math.random() * (randPVal + randNVal + 1)) - randNVal;
                    calculatedTime = Math.max(0, baseTime + fluctuation);
                }

                let targetUrl;
                try {
                    const decodedUrl = atob(encodedUrl);
                    const urlObj = new URL(decodedUrl);
                    
                    if (idParam) {
                        if (urlObj.hash) {
                            const hashConnector = urlObj.hash.includes('?') ? '&' : '?';
                            urlObj.hash = urlObj.hash + hashConnector + 'timer=' + encodeURIComponent(idParam);
                        } else {
                            urlObj.searchParams.set('timer', idParam);
                        }
                    }
                    targetUrl = urlObj.toString();
                } catch (e) {
                    try {
                        const decodedUrl = atob(encodedUrl);
                        if (idParam) {
                            targetUrl = decodedUrl + (decodedUrl.includes('?') ? '&' : '?') + 'timer=' + encodeURIComponent(idParam);
                        } else {
                            targetUrl = decodedUrl;
                        }
                    } catch(err) {
                        showError('エラー: 不正なURL形式、またはデコードに失敗しました。');
                        return;
                    }
                }

                const currentUnix = Math.floor(Date.now() / 1000);
                const newUrl = `?now=${currentUnix}&time=${calculatedTime}&redirectto=${encodeURIComponent(targetUrl)}`;
                window.location.replace(newUrl);
                return;
            }

            showError('エラー: URLパラメータが不足しています。');
        })();
    </script>
</body>
</html>
