<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* 常時ダークテーマ用のカラー変数 */
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #3b99ff;
            --muted: #a0a0a0;
            --border: #2d2d2d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
            margin: 1rem 0;
        }

        .url-display {
            font-size: 0.85rem;
            color: var(--muted);
            word-break: break-all;
            margin-bottom: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="app">
            <h1 id="status">リダイレクト準備中</h1>
            <div id="timer">--</div>
            <p id="message">まもなく指定のURLへ移動します</p>
            <div class="url-display" id="url-display"></div>
            <a id="manual-link" href="#" style="display:none;">今すぐ移動する</a>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const encodedUrl = params.get('url');
            const idParam = params.get('id');
            
            function parseTime(timeStr) {
                if (!timeStr) return 0;
                const match = timeStr.toLowerCase().match(/^(\d+)(h|m|s)?$/);
                if (match) {
                    const val = parseInt(match[1], 10);
                    const unit = match[2];
                    if (unit === 'h') return val * 3600;
                    if (unit === 'm') return val * 60;
                    return val;
                }
                return parseInt(timeStr.replace(/[^0-9]/g, '')) || 0;
            }

            const baseTime = parseTime(params.get('t') || '0s');
            const randVal = parseTime(params.get('rand'));
            const randPVal = params.has('randp') ? parseTime(params.get('randp')) : randVal;
            const randNVal = params.has('randn') ? parseTime(params.get('randn')) : randVal;
            
            let waitTime = baseTime;
            
            if (randPVal > 0 || randNVal > 0) {
                const fluctuation = Math.floor(Math.random() * (randPVal + randNVal + 1)) - randNVal;
                waitTime = Math.max(0, baseTime + fluctuation);
            }
            
            const statusEl = document.getElementById('status');
            const timerEl = document.getElementById('timer');
            const messageEl = document.getElementById('message');
            const urlDisplayEl = document.getElementById('url-display');
            const linkEl = document.getElementById('manual-link');

            if (!encodedUrl) {
                showError('エラー: URLパラメータが不足しています。');
                return;
            }

            let targetUrl;
            try {
                const decodedUrl = atob(encodedUrl);
                const urlObj = new URL(decodedUrl);
                
                if (idParam) {
                    if (urlObj.hash) {
                        const hashConnector = urlObj.hash.includes('?') ? '&' : '?';
                        urlObj.hash = urlObj.hash + hashConnector + 'timer=' + encodeURIComponent(idParam);
                    } else {
                        urlObj.searchParams.set('timer', idParam);
                    }
                }
                targetUrl = urlObj.toString();
            } catch (e) {
                try {
                    const decodedUrl = atob(encodedUrl);
                    if (idParam) {
                        targetUrl = decodedUrl + (decodedUrl.includes('?') ? '&' : '?') + 'timer=' + encodeURIComponent(idParam);
                    } else {
                        targetUrl = decodedUrl;
                    }
                } catch(err) {
                    showError('エラー: 不正なURL形式、またはデコードに失敗しました。');
                    return;
                }
            }

            urlDisplayEl.textContent = `移動先: ${targetUrl}`;
            linkEl.href = targetUrl;
            linkEl.style.display = 'inline-block';

            function showError(msg) {
                statusEl.textContent = 'Error';
                statusEl.classList.add('error');
                messageEl.textContent = msg;
                timerEl.textContent = '×';
            }

            function countdown() {
                if (waitTime <= 0) {
                    timerEl.textContent = '0';
                    statusEl.textContent = '移動中...';
                    window.location.href = targetUrl;
                } else {
                    statusEl.textContent = 'リダイレクト待機中';
                    timerEl.textContent = waitTime;
                    waitTime--;
                    setTimeout(countdown, 1000);
                }
            }

            countdown();
        })();
    </script>
</body>
</html>
