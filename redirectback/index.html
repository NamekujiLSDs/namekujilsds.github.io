<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redirecting...</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #3b99ff;
            --muted: #a0a0a0;
            --border: #2d2d2d;
            --danger: #ff6b6b;
        }

        body {
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            margin: 0;
            overscroll-behavior-y: none; /* スマホの引っ張り更新防止 */
            justify-content: center;
            align-items: center;
            padding: unset;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        #timer {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent);
            margin: 0.5rem 0;
        }

        #eta {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        #message {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .url-display {
            font-size: 0.85rem;
            color: var(--muted);
            word-break: break-all;
            margin-bottom: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* タップ時のハイライト消去 */
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: var(--danger);
        }
        
        /* カスタムキーボード用オーバーレイ */
        #pin-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .pin-box {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
            width: 320px;
            max-width: 90%;
        }
        .pin-display {
            font-size: 2.2rem;
            letter-spacing: 0.3rem;
            font-weight: bold;
            margin: 0.5rem 0;
            color: var(--danger);
        }

        /* 入力状態を示すドット */
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 30px;
        }
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--muted);
            background-color: transparent;
            transition: all 0.15s ease-out;
        }
        .dot.filled {
            background-color: var(--accent);
            border-color: var(--accent);
        }
        .dot.error {
            background-color: var(--danger);
            border-color: var(--danger);
            animation: shake 0.3s;
        }

        /* エラー時の振動アニメーション */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* オンスクリーンキーパッド */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 260px;
            margin: 0 auto;
        }
        .key {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 50%;
            font-size: 1.5rem;
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin: 0 auto;
            touch-action: manipulation; /* ダブルタップズームを無効化 */
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .key:active {
            background: var(--border);
        }
        .key.action {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="app">
            <h1 id="status">リダイレクト準備中</h1>
            <div id="timer">--</div>
            <div id="eta"></div>
            <p id="message">まもなく指定のURLへ移動します</p>
            <div class="url-display" id="url-display"></div>
            <a id="manual-link" href="#" style="display:none;">今すぐ移動する</a>
        </div>
    </div>

    <div id="pin-overlay">
        <div class="pin-box">
            <h3 style="margin-top: 0;">手動移動の確認</h3>
            <p style="font-size: 0.9rem; color: var(--muted);">以下のPINを入力してください</p>
            <div class="pin-display" id="expected-pin">0000</div>

            <div class="pin-dots" id="pin-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="keypad" id="keypad">
                <div class="key" data-val="1">1</div>
                <div class="key" data-val="2">2</div>
                <div class="key" data-val="3">3</div>
                <div class="key" data-val="4">4</div>
                <div class="key" data-val="5">5</div>
                <div class="key" data-val="6">6</div>
                <div class="key" data-val="7">7</div>
                <div class="key" data-val="8">8</div>
                <div class="key" data-val="9">9</div>
                <div class="key action" id="key-cancel">取消</div>
                <div class="key" data-val="0">0</div>
                <div class="key action" id="key-delete">⌫</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const statusEl = document.getElementById('status');
            const timerEl = document.getElementById('timer');
            const etaEl = document.getElementById('eta');
            const messageEl = document.getElementById('message');
            const urlDisplayEl = document.getElementById('url-display');
            const linkEl = document.getElementById('manual-link');

            function showError(msg) {
                statusEl.textContent = 'Error';
                statusEl.classList.add('error');
                messageEl.textContent = msg;
                timerEl.textContent = '×';
                etaEl.textContent = '';
                urlDisplayEl.textContent = '';
                linkEl.style.display = 'none';
            }

            function formatTimeDisplay(totalSeconds) {
                if (totalSeconds <= 0) return "0秒";
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                
                let result = "";
                if (h > 0) result += h + "時間 ";
                if (m > 0 || h > 0) result += m + "分 ";
                result += s + "秒";
                return result.trim();
            }

            // ==========================================
            // フェーズ2: カウントダウンの実行
            // ==========================================
            if (params.has('now') && params.has('time') && params.has('redirectto')) {
                const startUnix = parseInt(params.get('now'), 10);
                const waitTime = parseInt(params.get('time'), 10);
                const targetUrl = decodeURIComponent(params.get('redirectto'));

                if (isNaN(startUnix) || isNaN(waitTime) || !targetUrl) {
                    showError('エラー: 不正なパラメータです。');
                    return;
                }

                const targetUnix = startUnix + waitTime;
                
                const targetDate = new Date(targetUnix * 1000);
                const dateOptions = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
                etaEl.textContent = `終了予定: ${targetDate.toLocaleString('ja-JP', dateOptions)}`;

                urlDisplayEl.textContent = `移動先: ${targetUrl}`;
                linkEl.style.display = 'inline-block';

                // --- 誤爆防止 & カスタムキーパッドロジック ---
                let clickCount = 0;
                let clickTimer = null;
                let currentPin = '';
                let enteredPin = '';

                const overlay = document.getElementById('pin-overlay');
                const expectedPinEl = document.getElementById('expected-pin');
                const dots = document.querySelectorAll('.dot');
                const keys = document.querySelectorAll('.key');

                linkEl.addEventListener('click', function(e) {
                    e.preventDefault();
                    clickCount++;

                    if (clickCount >= 3) {
                        clearTimeout(clickTimer);
                        clickCount = 0;
                        showPinOverlay();
                    } else {
                        clearTimeout(clickTimer);
                        clickTimer = setTimeout(() => {
                            clickCount = 0;
                        }, 1000);
                    }
                });

                function updateDots() {
                    dots.forEach((dot, index) => {
                        dot.classList.remove('error');
                        if (index < enteredPin.length) {
                            dot.classList.add('filled');
                        } else {
                            dot.classList.remove('filled');
                        }
                    });
                }

                function showPinError() {
                    dots.forEach(dot => dot.classList.add('error'));
                    // アニメーションが終わる頃に入力値をリセット
                    setTimeout(() => {
                        enteredPin = '';
                        updateDots();
                    }, 400);
                }

                function showPinOverlay() {
                    currentPin = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                    expectedPinEl.textContent = currentPin;
                    enteredPin = '';
                    updateDots();
                    overlay.style.display = 'flex';
                }

                function hidePinOverlay() {
                    overlay.style.display = 'none';
                    currentPin = '';
                    enteredPin = '';
                }

                keys.forEach(key => {
                    key.addEventListener('click', function(e) {
                        e.preventDefault(); // タップ時の不要なブラウザ挙動を抑制
                        
                        if (this.id === 'key-cancel') {
                            hidePinOverlay();
                            return;
                        }
                        
                        if (this.id === 'key-delete') {
                            enteredPin = enteredPin.slice(0, -1);
                            updateDots();
                            return;
                        }

                        const val = this.getAttribute('data-val');
                        // 数値キーかつ、まだ4桁未満の場合
                        if (val !== null && enteredPin.length < 4) {
                            enteredPin += val;
                            updateDots();

                            // 4桁目が入力されたら即座に判定
                            if (enteredPin.length === 4) {
                                // ドットが埋まるのを視覚的に少し見せるための微小ディレイ
                                setTimeout(() => {
                                    if (enteredPin === currentPin) {
                                        window.location.replace(targetUrl);
                                    } else {
                                        showPinError();
                                    }
                                }, 100);
                            }
                        }
                    });
                });
                // ------------------------------------------------

                function updateTimer() {
                    const currentUnix = Math.floor(Date.now() / 1000);
                    const remaining = targetUnix - currentUnix;

                    if (remaining <= 0) {
                        timerEl.textContent = '0秒';
                        etaEl.textContent = '';
                        statusEl.textContent = '移動中...';
                        window.location.replace(targetUrl);
                    } else {
                        statusEl.textContent = 'リダイレクト待機中';
                        timerEl.textContent = formatTimeDisplay(remaining);
                        setTimeout(updateTimer, 500); 
                    }
                }
                updateTimer();
                return;
            }

            // ==========================================
            // フェーズ1: パラメータの初期化と再転送
            // ==========================================
            if (params.has('url')) {
                const encodedUrl = params.get('url');
                const idParam = params.get('id');
                
                function parseTime(timeStr) {
                    if (!timeStr) return 0;
                    const match = timeStr.toLowerCase().match(/^(\d+)(h|m|s)?$/);
                    if (match) {
                        const val = parseInt(match[1], 10);
                        const unit = match[2];
                        if (unit === 'h') return val * 3600;
                        if (unit === 'm') return val * 60;
                        return val;
                    }
                    return parseInt(timeStr.replace(/[^0-9]/g, '')) || 0;
                }

                const baseTime = parseTime(params.get('t') || '0s');
                const randVal = parseTime(params.get('rand'));
                const randPVal = params.has('randp') ? parseTime(params.get('randp')) : randVal;
                const randNVal = params.has('randn') ? parseTime(params.get('randn')) : randVal;
                
                let calculatedTime = baseTime;
                
                if (randPVal > 0 || randNVal > 0) {
                    const fluctuation = Math.floor(Math.random() * (randPVal + randNVal + 1)) - randNVal;
                    calculatedTime = Math.max(0, baseTime + fluctuation);
                }

                let targetUrl;
                try {
                    const decodedUrl = atob(encodedUrl);
                    const urlObj = new URL(decodedUrl);
                    
                    if (idParam) {
                        if (urlObj.hash) {
                            const hashConnector = urlObj.hash.includes('?') ? '&' : '?';
                            urlObj.hash = urlObj.hash + hashConnector + 'timer=' + encodeURIComponent(idParam);
                        } else {
                            urlObj.searchParams.set('timer', idParam);
                        }
                    }
                    targetUrl = urlObj.toString();
                } catch (e) {
                    try {
                        const decodedUrl = atob(encodedUrl);
                        if (idParam) {
                            targetUrl = decodedUrl + (decodedUrl.includes('?') ? '&' : '?') + 'timer=' + encodeURIComponent(idParam);
                        } else {
                            targetUrl = decodedUrl;
                        }
                    } catch(err) {
                        showError('エラー: 不正なURL形式、またはデコードに失敗しました。');
                        return;
                    }
                }

                const currentUnix = Math.floor(Date.now() / 1000);
                const newUrl = `?now=${currentUnix}&time=${calculatedTime}&redirectto=${encodeURIComponent(targetUrl)}`;
                window.location.replace(newUrl);
                return;
            }

            showError('エラー: URLパラメータが不足しています。');
        })();
    </script>
</body>
</html>
