<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #3b99ff;
            --muted: #a0a0a0;
            --border: #2d2d2d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        #timer {
            font-size: 2.2rem; /* 「時間分秒」が入るため、前の3remから少し縮小して折り返しを防止 */
            font-weight: bold;
            color: var(--accent);
            margin: 1rem 0;
        }

        .url-display {
            font-size: 0.85rem;
            color: var(--muted);
            word-break: break-all;
            margin-bottom: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="app">
            <h1 id="status">リダイレクト準備中</h1>
            <div id="timer">--</div>
            <p id="message">まもなく指定のURLへ移動します</p>
            <div class="url-display" id="url-display"></div>
            <a id="manual-link" href="#" style="display:none;">今すぐ移動する</a>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const statusEl = document.getElementById('status');
            const timerEl = document.getElementById('timer');
            const messageEl = document.getElementById('message');
            const urlDisplayEl = document.getElementById('url-display');
            const linkEl = document.getElementById('manual-link');

            function showError(msg) {
                statusEl.textContent = 'Error';
                statusEl.classList.add('error');
                messageEl.textContent = msg;
                timerEl.textContent = '×';
                urlDisplayEl.textContent = '';
                linkEl.style.display = 'none';
            }

            // 秒数を「n時間n分n秒」にフォーマットする関数
            function formatTimeDisplay(totalSeconds) {
                if (totalSeconds <= 0) return "0秒";
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                
                let result = "";
                if (h > 0) result += h + "時間 ";
                if (m > 0 || h > 0) result += m + "分 ";
                result += s + "秒";
                
                return result.trim();
            }

            // ==========================================
            // フェーズ2: カウントダウンの実行
            // ==========================================
            if (params.has('now') && params.has('time') && params.has('redirectto')) {
                const startUnix = parseInt(params.get('now'), 10);
                const waitTime = parseInt(params.get('time'), 10);
                const targetUrl = decodeURIComponent(params.get('redirectto'));

                if (isNaN(startUnix) || isNaN(waitTime) || !targetUrl) {
                    showError('エラー: 不正なパラメータです。');
                    return;
                }

                const targetUnix = startUnix + waitTime;

                urlDisplayEl.textContent = `移動先: ${targetUrl}`;
                linkEl.href = targetUrl;
                linkEl.style.display = 'inline-block';

                function updateTimer() {
                    const currentUnix = Math.floor(Date.now() / 1000);
                    const remaining = targetUnix - currentUnix;

                    if (remaining <= 0) {
                        timerEl.textContent = '0秒';
                        statusEl.textContent = '移動中...';
                        window.location.replace(targetUrl);
                    } else {
                        statusEl.textContent = 'リダイレクト待機中';
                        // フォーマット関数を通してから表示
                        timerEl.textContent = formatTimeDisplay(remaining);
                        setTimeout(updateTimer, 500); 
                    }
                }
                updateTimer();
                return;
            }

            // ==========================================
            // フェーズ1: パラメータの初期化と再転送
            // ==========================================
            if (params.has('url')) {
                const encodedUrl = params.get('url');
                const idParam = params.get('id');
                
                function parseTime(timeStr) {
                    if (!timeStr) return 0;
                    const match = timeStr.toLowerCase().match(/^(\d+)(h|m|s)?$/);
                    if (match) {
                        const val = parseInt(match[1], 10);
                        const unit = match[2];
                        if (unit === 'h') return val * 3600;
                        if (unit === 'm') return val * 60;
                        return val;
                    }
                    return parseInt(timeStr.replace(/[^0-9]/g, '')) || 0;
                }

                const baseTime = parseTime(params.get('t') || '0s');
                const randVal = parseTime(params.get('rand'));
                const randPVal = params.has('randp') ? parseTime(params.get('randp')) : randVal;
                const randNVal = params.has('randn') ? parseTime(params.get('randn')) : randVal;
                
                let calculatedTime = baseTime;
                
                if (randPVal > 0 || randNVal > 0) {
                    const fluctuation = Math.floor(Math.random() * (randPVal + randNVal + 1)) - randNVal;
                    calculatedTime = Math.max(0, baseTime + fluctuation);
                }

                let targetUrl;
                try {
                    const decodedUrl = atob(encodedUrl);
                    const urlObj = new URL(decodedUrl);
                    
                    if (idParam) {
                        if (urlObj.hash) {
                            const hashConnector = urlObj.hash.includes('?') ? '&' : '?';
                            urlObj.hash = urlObj.hash + hashConnector + 'timer=' + encodeURIComponent(idParam);
                        } else {
                            urlObj.searchParams.set('timer', idParam);
                        }
                    }
                    targetUrl = urlObj.toString();
                } catch (e) {
                    try {
                        const decodedUrl = atob(encodedUrl);
                        if (idParam) {
                            targetUrl = decodedUrl + (decodedUrl.includes('?') ? '&' : '?') + 'timer=' + encodeURIComponent(idParam);
                        } else {
                            targetUrl = decodedUrl;
                        }
                    } catch(err) {
                        showError('エラー: 不正なURL形式、またはデコードに失敗しました。');
                        return;
                    }
                }

                const currentUnix = Math.floor(Date.now() / 1000);
                const newUrl = `?now=${currentUnix}&time=${calculatedTime}&redirectto=${encodeURIComponent(targetUrl)}`;
                window.location.replace(newUrl);
                return;
            }

            showError('エラー: URLパラメータが不足しています。');
        })();
    </script>
</body>
</html>
