<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>素材計算機 - ワールド武器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body { font-family: "MS PGothic", "Hiragino Kaku Gothic ProN", sans-serif; color: #000; background-color: #fff; padding: 20px; line-height: 1.2; }
  h1 { font-size: 18px; border-bottom: 2px solid #333; margin-bottom: 10px; }
  h2 { font-size: 15px; margin: 15px 0 5px; border-left: 5px solid #666; padding-left: 8px; }
  .section { background-color: #f4f4f4; border: 1px solid #333; padding: 10px; margin-bottom: 15px; }
  .code-box { background: #fff; border: 1px inset #ccc; padding: 5px; font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 60px; overflow-y: auto; display: block; margin: 5px 0; }
  .target-row { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; font-size: 13px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
  table { border-collapse: collapse; background-color: #fff; width: 100%; max-width: 700px; margin-bottom: 10px; }
  th, td { border: 1px solid #333; padding: 4px 8px; font-size: 13px; text-align: right; }
  th { background-color: #ccc; text-align: center; font-weight: bold; }
  td.name { text-align: left; font-weight: bold; background-color: #f9f9f9; }
  .btn-group { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  button { padding: 4px 12px; border: 2px outset #ccc; background-color: #e0e0e0; cursor: pointer; font-weight: bold; font-size: 12px; }
  button:active { border-style: inset; }
  input[type="number"] { width: 75px; text-align: right; }
  .shortage { color: #d00 !important; font-weight: bold; }
  .ok { color: #008800 !important; }
  #captureArea { padding: 25px; background-color: white; display: inline-block; position: absolute; left: -9999px; border: 1px solid #000; }
  #captureArea h3 { margin: 0 0 15px 0; font-size: 20px; border-bottom: 2px solid #333; padding-bottom: 5px; }
  .info-list { margin-bottom: 20px; font-size: 15px; list-style: none; padding: 0; border: 1px solid #999; padding: 10px; background: #f9f9f9; }
  .info-list li { margin-bottom: 4px; font-weight: bold; }

  @media (prefers-color-scheme: dark) {
    body { color: #eee; background-color: #121212; }
    h1 { border-bottom-color: #888; }
    .section, .code-box, table { background-color: #1e1e1e; border-color: #555; }
    th { background-color: #333; color: #fff; }
    td, th { border-color: #555; }
    td.name { background-color: #252525; }
    input, select { background-color: #000; color: #fff; border-color: #555; }
    button { background-color: #333; color: #fff; border-color: #555; }
    .shortage { color: #ff6666 !important; }
    .ok { color: #00ff00 !important; }
    #captureArea { background-color: #121212; color: #eee; border-color: #444; }
    .info-list { background: #222; border-color: #555; }
  }
</style>
</head>
<body>

<h1>ワールド武器 素材計算機</h1>

<div class="section">
  <strong>1. アイテム取得用ブックマークレット</strong>
  <code class="code-box" id="bmCode"></code>
  <button onclick="copyBM()">コードをコピー</button>
</div>

<div class="section">
  <strong>2. 作成目標の設定</strong>
  <div id="targetsContainer" style="margin-top:10px;"></div>
  <button onclick="addTargetRow()" style="margin-top:5px;">＋ 武器を追加</button>
</div>

<h2>計算結果</h2>
<table id="mainTable">
  <thead>
    <tr>
      <th style="width: 220px;">素材名</th>
      <th style="width: 160px;">所持 / 必要</th>
      <th style="width: 80px;">不足</th>
      <th style="width: 100px;">手動入力</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="btn-group">
  <button onclick="loadFromClipboard()" style="background-color: #d0e0ff; color: #000;">データを読み込む</button>
  <button onclick="exportImage(false)" style="background-color: #e0ffe0; color: #000;">フル素材リストを画像化</button>
  <button onclick="exportImage(true)" style="background-color: #ffe0e0; color: #000;">不足素材のみ画像化</button>
  <button onclick="resetInventory()">所持数リセット</button>
</div>

<div id="captureArea">
  <h3 id="capTitle">素材計算結果</h3>
  <div style="font-size: 13px; margin-bottom: 5px;">【作成目標】</div>
  <ul id="capInfo" class="info-list"></ul>
  <table id="capTable">
    <thead>
      <tr>
        <th style="width: 280px;">素材名</th>
        <th style="width: 220px;">所持 / 必要</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// ご提示いただいたJSONデータを展開
const MATERIAL_DATA = {
    "レオン・オブ・ワールド": {
        "交換": {"世界のイデア":1,"エゲイラ・ゴスペル":3,"悪魔のウェリタス":10,"太陽のウェリタス":10},
        "1凸": {"世界のイデア":5,"エゲイラ・ゴスペル":5,"悪魔のウェリタス":30,"太陽のウェリタス":30,"イグニス・ブライト":5,"火精のアストラ":10},
        "2凸": {"世界のイデア":10,"エゲイラ・ゴスペル":7,"悪魔のウェリタス":50,"太陽のウェリタス":50,"イグニス・ブライト":10,"火精のアストラ":25,"ミカエルのアニマ":10},
        "3凸": {"世界のイデア":15,"エゲイラ・ゴスペル":10,"悪魔のウェリタス":70,"太陽のウェリタス":70,"イグニス・ブライト":15,"火精のアストラ":50,"ミカエルのアニマ":20},
        "4凸": {"世界のイデア":35,"エゲイラ・ゴスペル":15,"悪魔のウェリタス":100,"太陽のウェリタス":100,"イグニス・ブライト":20,"火精のアストラ":50,"悪魔のイデア":30,"太陽のイデア":30}
    },
    "アエトス・オブ・ワールド": {
        "交換": {"世界のイデア":1,"アナリプシア・ゴスペル":3,"正義のウェリタス":10,"月のウェリタス":10},
        "1凸": {"世界のイデア":5,"アナリプシア・ゴスペル":5,"正義のウェリタス":30,"月のウェリタス":30,"アクア・ブライト":5,"水精のアストラ":10},
        "2凸": {"世界のイデア":10,"アナリプシア・ゴスペル":7,"正義のウェリタス":50,"月のウェリタス":50,"アクア・ブライト":10,"水精のアストラ":25,"ガブリエルのアニマ":10},
        "3凸": {"世界のイデア":15,"アナリプシア・ゴスペル":10,"正義のウェリタス":70,"月のウェリタス":70,"アクア・ブライト":15,"水精のアストラ":50,"ガブリエルのアニマ":20},
        "4凸": {"世界のイデア":35,"アナリプシア・ゴスペル":15,"正義のウェリタス":100,"月のウェリタス":100,"アクア・ブライト":20,"水精のアストラ":50,"正義のイデア":30,"月のイデア":30}
    },
    "タウルス・オブ・ワールド": {
        "交換": {"世界のイデア":1,"テュシア・ゴスペル":3,"刑死者のウェリタス":10,"塔のウェリタス":10},
        "1凸": {"世界のイデア":5,"テュシア・ゴスペル":5,"刑死者のウェリタス":30,"塔のウェリタス":30,"テラ・ブライト":5,"土精のアストラ":10},
        "2凸": {"世界のイデア":10,"テュシア・ゴスペル":7,"刑死者のウェリタス":50,"塔のウェリタス":50,"テラ・ブライト":10,"土精のアストラ":25,"ウリエルのアニマ":10},
        "3凸": {"世界のイデア":15,"テュシア・ゴスペル":10,"刑死者のウェリタス":70,"塔のウェリタス":70,"テラ・ブライト":15,"土精のアストラ":50,"ウリエルのアニマ":20},
        "4凸": {"世界のイデア":35,"テュシア・ゴスペル":15,"刑死者のウェリタス":100,"塔のウェリタス":100,"テラ・ブライト":20,"土精のアストラ":50,"刑死者のイデア":30,"塔のイデア":30}
    },
    "アンゲルス・オブ・ワールド": {
        "交換": {"世界のイデア":1,"ゲネア・ゴスペル":3,"節制のウェリタス":10,"審判のウェリタス":10},
        "1凸": {"世界のイデア":5,"ゲネア・ゴスペル":5,"節制のウェリタス":30,"審判のウェリタス":30,"ウェントス・ブライト":5,"風精のアストラ":10},
        "2凸": {"世界のイデア":10,"ゲネア・ゴスペル":7,"節制のウェリタス":50,"審判のウェリタス":50,"ウェントス・ブライト":10,"風精のアストラ":25,"ラファエルのアニマ":10},
        "3凸": {"世界のイデア":15,"ゲネア・ゴスペル":10,"節制のウェリタス":70,"審判のウェリタス":70,"ウェントス・ブライト":15,"風精のアストラ":50,"ラファエルのアニマ":20},
        "4凸": {"世界のイデア":35,"ゲネア・ゴスペル":15,"節制のウェリタス":100,"審判のウェリタス":100,"ウェントス・ブライト":20,"風精のアストラ":50,"節制のイデア":30,"審判のイデア":30}
    },
    "マーレ・オブ・ワールド": {
        "交換": {"世界のイデア":1,"エフェシス・ゴスペル":3,"星のウェリタス":10,"死神のウェリタス":10},
        "1凸": {"世界のイデア":5,"エフェシス・ゴスペル":5,"星のウェリタス":30,"死神のウェリタス":30,"ダーク・ブライト":5,"闇精のアストラ":10},
        "2凸": {"世界のイデア":10,"エフェシス・ゴスペル":7,"星のウェリタス":50,"死神のウェリタス":50,"ダーク・ブライト":10,"闇精のアストラ":25,"創世の魂":10},
        "3凸": {"世界のイデア":15,"エフェシス・ゴスペル":10,"星のウェリタス":70,"死神のウェリタス":70,"ダーク・ブライト":15,"闇精のアストラ":50,"創世の魂":20},
        "4凸": {"世界のイデア":35,"エフェシス・ゴスペル":15,"星のウェリタス":100,"死神のウェリタス":100,"ダーク・ブライト":20,"闇精のアストラ":50,"星のイデア":30,"死神のイデア":30}
    }
};

const STAGES = ["交換前", "無凸", "1凸", "2凸", "3凸", "4凸"];
const STAGE_KEYS = ["交換", "1凸", "2凸", "3凸", "4凸"];

let inventory = {};
const bmCode = 'javascript:(function(){  const uid = JSON.parse(document.getElementById("server-props").textContent).userId;  const now = Date.now();  const ver = (typeof Game !== 'undefined') ? Game.version : "1778472014";  const url = `https://game.granbluefantasy.jp/item/article_list_by_filter_mode?_=${now}&t=${now}&uid=${uid}`;  fetch(url, {    "headers": {      "accept": "application/json, text/javascript, */*; q=0.01",      "x-requested-with": "XMLHttpRequest",      "x-version": ver    },    "referrer": "https://game.granbluefantasy.jp/",    "method": "GET",    "credentials": "include"  })  .then(res => res.text())  .then(text => {    const ta = document.createElement(%27textarea%27);    ta.value = text;    document.body.appendChild(ta);    ta.select();    document.execCommand(%27copy%27);    document.body.removeChild(ta);    alert(%27アイテムデータをコピーしました！\n計算機サイトで「読み込み」を押してください。%27);  })  .catch(err => alert(%27取得に失敗しました。ゲーム画面で実行しているか確認してください。\n%27 + err));})();';
document.getElementById('bmCode').innerText = bmCode;

function copyBM() { navigator.clipboard.writeText(bmCode); alert("コピーしました。"); }

function addTargetRow() {
    const div = document.createElement("div");
    div.className = "target-row";
    div.innerHTML = `
        <select class="w-sel" onchange="updateView()">${Object.keys(MATERIAL_DATA).map(k=>`<option value="${k}">${k.split('・')[0]}</option>`).join('')}</select>
        <select class="c-sel" onchange="updateView()">${STAGES.slice(0,5).map((l,i)=>`<option value="${i}">${l}</option>`).join('')}</select>
        <span>➡</span>
        <select class="t-sel" onchange="updateView()">${STAGES.slice(1).map((l,i)=>`<option value="${i+1}" ${i==4?'selected':''}>${l}</option>`).join('')}</select>
        <button onclick="this.parentElement.remove();updateView();">削除</button>`;
    document.getElementById("targetsContainer").appendChild(div);
    updateView();
}

function updateView() {
    const totals = {};
    const info = [];
    document.querySelectorAll('.target-row').forEach(row => {
        const wKey = row.querySelector('.w-sel').value;
        const cIdx = parseInt(row.querySelector('.c-sel').value);
        const tIdx = parseInt(row.querySelector('.t-sel').value);
        if (cIdx >= tIdx) return;

        info.push(`${wKey.split('・')[0]} (${STAGES[cIdx]} ➡ ${STAGES[tIdx]})`);
        
        for (let i = cIdx; i < tIdx; i++) {
            const stageKey = STAGE_KEYS[i];
            const mats = MATERIAL_DATA[wKey][stageKey];
            for (const [mName, count] of Object.entries(mats)) {
                totals[mName] = (totals[mName] || 0) + count;
            }
        }
    });

    const tbody = document.querySelector('#mainTable tbody');
    tbody.innerHTML = '';
    const sorted = Object.keys(totals).sort((a,b) => (a==="世界のイデア") ? -1 : (b==="世界のイデア") ? 1 : a.localeCompare(b, 'ja'));

    sorted.forEach(name => {
        const req = totals[name], pos = inventory[name] || 0, diff = Math.max(0, req - pos);
        const cls = diff > 0 ? 'shortage' : 'ok';
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="name">${name}</td><td class="${cls}">${pos} / ${req}</td><td class="${cls}">${diff}</td><td><input type="number" value="${pos}" oninput="inventory['${name}']=parseInt(this.value)||0;updateView();"></td>`;
        tbody.appendChild(tr);
    });
    window.lastData = { totals, info };
}

function exportImage(onlyShortage) {
    const { totals, info } = window.lastData;
    if (!totals) return;
    const capTbody = document.querySelector('#capTable tbody');
    const capInfo = document.getElementById('capInfo');
    capTbody.innerHTML = '';
    capInfo.innerHTML = info.map(line => `<li>・${line}</li>`).join('');
    document.getElementById('capTitle').innerText = onlyShortage ? "不足素材リスト" : "必要素材リスト(フル)";

    Object.keys(totals).sort((a,b) => (a==="世界のイデア") ? -1 : (b==="世界のイデア") ? 1 : a.localeCompare(b, 'ja')).forEach(name => {
        const req = totals[name], pos = inventory[name] || 0, diff = Math.max(0, req - pos);
        if (onlyShortage && diff === 0) return;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="name" style="background:none;">${name}</td><td class="${diff>0?'shortage':'ok'}">${pos} / ${req}</td>`;
        capTbody.appendChild(tr);
    });

    if (capTbody.rows.length === 0) return alert("表示する素材がありません。");

    html2canvas(document.getElementById("captureArea"), { backgroundColor: null, scale: 2 }).then(canvas => {
        const link = document.createElement("a");
        link.download = `world_mats_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });
}

async function loadFromClipboard() {
    try {
        let t = await navigator.clipboard.readText();
        if (!t.includes('[')) t = prompt("JSONデータを貼り付けてください");
        JSON.parse(t).forEach(i => { if(i.name) inventory[i.name] = parseInt(i.number); });
        updateView(); alert("読み込みました。");
    } catch(e) { alert("エラー: 正しいデータをコピーしてください。"); }
}

function resetInventory() { if(confirm("リセットしますか？")) { inventory={}; updateView(); } }
window.onload = addTargetRow;
</script>
</body>
</html>
