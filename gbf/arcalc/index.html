<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十賢者素材計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 日本語フォントを明示的に指定 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Roboto+Mono:wght@700&display=swap');

        body {
            font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
            background-color: #020617;
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.4;
        }

        /* 昔ながらの攻略サイト風：ソリッドな枠線 */
        .retro-table {
            border: 1px solid #334155;
            background-color: #0f172a;
        }

        .retro-header {
            background-color: #1e293b;
            color: #f1f5f9;
            padding: 4px 8px;
            font-weight: bold;
            border-bottom: 1px solid #334155;
            font-size: 10px;
            letter-spacing: 0.05em;
        }

        .btn-base {
            border: 1px solid #334155;
            background-color: #1e293b;
            padding: 2px 6px;
            transition: all 0.1s;
        }

        .btn-base:hover {
            background-color: #334155;
        }

        .btn-active {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #2563eb !important;
        }

        .btn-done {
            background-color: #064e3b !important;
            color: #4ade80 !important;
            border-color: #065f46 !important;
        }

        .item-row {
            border-bottom: 1px solid #1e293b;
        }

        .item-row:hover {
            background-color: #1e293b/50;
        }

        .text-ok {
            color: #4ade80;
            font-weight: bold;
        }

        /* 充足 */
        .text-ng {
            color: #f87171;
            font-weight: bold;
        }

        /* 不足 */

        .num-font {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
        }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
        }

        /* 画像書き出し専用コンテナ */
        #hidden-export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background-color: #020617;
            display: inline-block;
            padding: 40px;
            box-sizing: border-box;
            color: #f1f5f9;
        }

        .export-text {
            line-height: 2.0 !important;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

                "討滅戦": { "マリア・テレサ": "氷獄の結晶", "カイム": "裁考の水晶", "ニーア": "幻魔の破片", "エスタリオラ": "人馬の円盤", "フラウ": "灼熱の焰角", "ロベリア": "裁考の水晶", "ガイゼンボーガ": "妃光の水晶", "ハーゼリーラ": "氷獄の結晶", "アラナン": "灼熱の焰角", "カッツェリーラ": "人馬の円盤" },
                "ナルグランデ": { "マリア・テレサ": "トキシックフラワー", "カイム": "ベスティエフルーツ", "ニーア": "巨獣骨", "エスタリオラ": "クルーガーハープ", "フラウ": "レムペッパー", "ロベリア": "割れたティーカップ", "ガイゼンボーガ": "錆びついた掛瓦", "ハーゼリーラ": "透き通るような絹", "アラナン": "修行者の覚書", "カッツェリーラ": "埃まみれの書物" },
                "鱗": { "火": "赤竜鱗", "水": "青竜鱗", "土": "地竜鱗", "風": "風竜鱗", "光": "白竜鱗", "闇": "黒竜鱗" }
            },
            "必要アイテム": {
                "1": { "セフィラストーン": 2, "アストラ": 3, "イデア": 2, "ヴェルム文書": 6, "ヘイズ": 1, "星晶塊": 100, "マグナ": 30 },
                "2": { "セフィラストーン": 5, "アストラ": 5, "イデア": 3, "ヴェルム文書": 16, "ヘイズ": 3, "虹星晶": 100, "エレメント": 100 },
                "3": { "セフィラストーン": 10, "アストラ": 10, "イデア": 5, "ヴェルム文書": 30, "旧召喚石": 30 },
                "4": { "セフィラストーン": 15, "アストラ": 15, "イデア": 7, "ヴェルム文書": 50, "ヘイズ": 16, "新召喚石": 30, "究竟の証": 3 },
                "5": { "セフィラストーン": 30, "アストラ": 30, "イデア": 15, "ヴェルム文書": 80, "ヘイズ": 24, "銀天の輝き": 5, "天司": 20, "金剛晶": 1 },
                "6": { "セフィラストーン": 45, "アストラ": 45, "イデア": 25, "ヴェルム文書": 120, "ヘイズ": 32, "レガリア": 10, "フラグメント": 10 },
                "7": { "ヴェルム文書": 250, "フラグメント": 20, "討滅戦": 100, "石片": 50, "ジェネシス・フラグメント": 80, "バハムートの紫電角": 10, "ナルグランデ": 50 },
                "8": { "セフィラストーン": 30, "アストラ": 200, "イデア": 20, "セフィラ玉髄": 1 },
                "9": { "ヴェルム文書": 2, "星晶塊": 5, "覇者の証": 1 },
                "10": { "アストラ": 1, "ヴェルム文書": 2, "星晶塊": 10, "鱗": 1, "覇者の証": 3 },
                "11": { "アストラ": 2, "ヴェルム文書": 6, "虹星晶": 13, "イデア": 1, "覇者の証": 6 },
                "12": { "アストラ": 3, "ヴェルム文書": 10, "ヘイズ": 3, "イデア": 1, "覇者の証": 10 },
                "13": { "ニューワールド・クォーツ": 5, "ブライト": 5, "ウェリタス": 20 },
                "14": { "ニューワールド・クォーツ": 5, "ブライト": 15, "ウェリタス": 70, "マリス・フラグメント": 30, "ヴェルム文書": 100, "アストラ": 30 },
                "15": { "ニューワールド・クォーツ": 10, "ブライト": 30, "ウェリタス": 100, "蒼翠の結晶": 20, "ヴェルム文書": 150, "アストラ": 50, "イデア": 30 },
                "16": { "ニューワールド・クォーツ": 20, "ブライト": 50, "ウェリタス": 130, "竜珠": 20, "ヴェルム文書": 200, "アストラ": 100, "イデア": 70 },
                "17": { "ニューワールド・クォーツ": 20, "ブライト": 60, "ウェリタス": 150, "竜珠": 30, "ヴェルム文書": 250, "アストラ": 120, "イデア": 100 },
                "18": { "ニューワールド・クォーツ": 30, "ブライト": 35, "ウェリタス": 170, "六竜素材": 30, "フラグメント": 30, "アストラ": 140, "イデア": 130, "刻の流砂": 3 },
                "19": { "ジェネシス・フラグメント": 30, "ヴェルム文書": 120, "ヘイズ": 20, "セフィラストーン": 5 },
                "20": { "プシュケー": 30, "ヴェルム文書": 240, "アストラ": 30, "ヘイズ": 30, "セフィラストーン": 10 },
                "21": { "レガリア": 10, "ウェリタス": 30, "アストラ": 40, "イデア": 40, "フラグメント": 10, "セフィラストーン": 15 },
                "22": { "六竜素材": 30, "ブライト": 20, "ウェリタス": 50, "アストラ": 40, "イデア": 70, "フラグメント": 20, "セフィラストーン": 20 },
                "23": { "セフィラ玉髄": 1, "ディフェンダー": 50, "ブライト": 50, "セフィラストーン": 200 },
                "24": { "金剛晶": 1, "世界のイデア": 100, "ニューワールド・クォーツ": 30, "ダマスカス骸晶": 10 }
            }
        };

        // 指定されたブックマークレットコード
        const BOOKMARKLET_CODE = `javascript:(function(){  const uid = JSON.parse(document.getElementById("server-props").textContent).userId;  const now = Date.now();  const ver = (typeof Game !== 'undefined') ? Game.version : "1778472014";  const url = \`https://game.granbluefantasy.jp/item/article_list_by_filter_mode?_=\${now}&t=\${now}&uid=\${uid}\`;  fetch(url, {    "headers": {      "accept": "application/json, text/javascript, */*; q=0.01",      "x-requested-with": "XMLHttpRequest",      "x-version": ver    },    "referrer": "https://game.granbluefantasy.jp/",    "method": "GET",    "credentials": "include"  })  .then(res => res.text())  .then(text => {    const ta = document.createElement('textarea');    ta.value = text;    document.body.appendChild(ta);    ta.select();    document.execCommand('copy');    document.body.removeChild(ta);    alert('アイテムデータをコピーしました！\\n計算機サイトで「読み込み」を押してください。');  })  .catch(err => alert('取得に失敗しました。ゲーム画面で実行しているか確認してください。\\n' + err));})();`;

        const App = () => {
            const [selectedCharacter, setSelectedCharacter] = useState(() => {
                const p = new URLSearchParams(window.location.search);
                return p.get('c') || JSON.parse(localStorage.getItem('gbf_save_v5') || '{}').char || "マリア・テレサ";
            });
            const [start, setStart] = useState(() => {
                const p = new URLSearchParams(window.location.search);
                return parseInt(p.get('s')) || JSON.parse(localStorage.getItem('gbf_save_v5') || '{}').start || 0;
            });
            const [end, setEnd] = useState(() => {
                const p = new URLSearchParams(window.location.search);
                return parseInt(p.get('e')) || JSON.parse(localStorage.getItem('gbf_save_v5') || '{}').target || 24;
            });
            const [inventory, setInventory] = useState(() => JSON.parse(localStorage.getItem('gbf_inv_v5') || '{}'));
            const [inputMode, setInputMode] = useState("current");
            const [isExporting, setIsExporting] = useState(false);
            const [exportShortage, setExportShortage] = useState(false);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                localStorage.setItem('gbf_save_v5', JSON.stringify({ char: selectedCharacter, start, target: end }));
                localStorage.setItem('gbf_inv_v5', JSON.stringify(inventory));
                try {
                    const p = new URLSearchParams();
                    p.set('c', selectedCharacter); p.set('s', start); p.set('e', end);
                    window.history.replaceState({}, '', `?${p.toString()}`);
                } catch (e) { }
            }, [selectedCharacter, start, end, inventory]);

            const summary = useMemo(() => {
                const res = {};
                const add = (n, v) => res[n] = (res[n] || 0) + v;
                for (let i = start + 1; i <= end; i++) {
                    const req = rawData.必要アイテム[i.toString()];
                    if (!req) continue;
                    Object.entries(req).forEach(([cat, amt]) => {
                        const map = rawData.アイテム対応表[cat];
                        if (map) {
                            if (["イデア", "ウェリタス", "フラグメント", "ヘイズ", "討滅戦", "ナルグランデ"].includes(cat)) {
                                const sub = map[selectedCharacter];
                                const suf = cat === "フラグメント" ? "・フラグメント" : cat === "ヘイズ" ? "・ヘイズ" : cat.includes("戦") || cat.includes("ナル") ? "" : `の${cat}`;
                                add(`${sub}${suf}`, amt);
                            } else if (["ヴェルム文書", "ブライト", "ディフェンダー"].includes(cat)) {
                                const types = map[selectedCharacter];
                                types.forEach(t => {
                                    const name = cat === "ヴェルム文書" ? `ヴェルム文書・${t}` : (cat === "ブライト" ? `${t}・ブライト` : `${t}・ゴスペル`);
                                    add(name, Math.ceil(amt / types.length));
                                });
                            } else if (map[rawData.十賢者詳細[selectedCharacter].属性]) {
                                const sub = map[rawData.十賢者詳細[selectedCharacter].属性];
                                const table = { "石片": `${sub}の石片`, "天司": `${sub}のアニマ`, "アストラ": `${sub}のアストラ`, "マグナ": `${sub}のマグナアニマ`, "レガリア": `${sub}のマグナアニマ`, "旧召喚石": `${sub}のマグナアニマ`, "新召喚石": `${sub}のマグナアニマ`, "竜珠": `${sub}の竜珠` };
                                add(table[cat] || sub, amt);
                            }
                        } else add(cat, amt);
                    });
                }
                return res;
            }, [selectedCharacter, start, end]);

            const handleImport = async () => {
                try {
                    let text = await navigator.clipboard.readText();
                    if (!text.includes('[')) text = prompt("素材データを貼り付けてください：");
                    if (!text) return;
                    const data = JSON.parse(text);
                    const newInv = {};
                    if (Array.isArray(data)) data.forEach(i => { if (i.name) newInv[i.name] = parseInt(i.number || 0); });
                    else Object.assign(newInv, data);
                    setInventory(newInv);
                    alert("所持数を反映しました");
                } catch (e) { alert("データの形式が正しくありません"); }
            };

            const handleCopyBookmarklet = () => {
                navigator.clipboard.writeText(BOOKMARKLET_CODE);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handleExport = (shortageOnly) => {
                setExportShortage(shortageOnly);
                setIsExporting(true);
                setTimeout(async () => {
                    const el = document.getElementById("hidden-export-container");
                    try {
                        const canvas = await html2canvas(el, { backgroundColor: "#020617", scale: 2, logging: false });
                        const link = document.createElement("a");
                        link.href = canvas.toDataURL("image/png");
                        link.download = `${selectedCharacter}_${shortageOnly ? '不足' : '全'}素材.png`;
                        link.click();
                    } catch (e) { }
                    setIsExporting(false);
                }, 100);
            };

            const MaterialTable = ({ items, isExport = false, onlyShortage = false }) => {
                let list = Object.entries(items).sort((a, b) => b[1] - a[1]);
                if (onlyShortage) list = list.filter(([n, a]) => (inventory[n] || 0) < a);
                if (list.length === 0) return <div className="p-4 text-center opacity-40">該当なし</div>;

                if (isExport) {
                    const chunks = [];
                    for (let i = 0; i < list.length; i += 8) chunks.push(list.slice(i, i + 8));
                    return (
                        <div className="flex gap-x-12 items-start">
                            {chunks.map((chunk, idx) => (
                                <div key={idx} className="space-y-4">
                                    {chunk.map(([n, a]) => {
                                        const pos = inventory[n] || 0;
                                        const ok = pos >= a;
                                        return (
                                            <div key={n} className="flex justify-between items-baseline min-w-[320px] border-b border-slate-800 pb-2">
                                                <span className="text-[14px] font-bold pr-6 export-text">{n}</span>
                                                <span className={`num-font text-[16px] whitespace-nowrap ${ok ? 'text-ok' : 'text-ng'}`}>
                                                    {pos.toLocaleString()} / {a.toLocaleString()}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    );
                }

                return (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-1">
                        {list.map(([n, a]) => {
                            const pos = inventory[n] || 0;
                            const ok = pos >= a;
                            return (
                                <div key={n} className="item-row flex justify-between items-center py-1.5 px-2">
                                    <span className="font-bold text-[11px] truncate pr-2 text-slate-300">{n}</span>
                                    <span className={`num-font text-[11px] whitespace-nowrap ${ok ? 'text-ok' : 'text-ng'}`}>
                                        {pos.toLocaleString()} / {a.toLocaleString()}
                                    </span>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="p-4 max-w-5xl mx-auto space-y-4">
                    {/* Character Selector */}
                    <div className="retro-table p-2 flex flex-wrap gap-1">
                        {Object.keys(rawData.十賢者詳細).map(name => (
                            <button key={name} onClick={() => setSelectedCharacter(name)}
                                className={`btn-base text-[10px] font-bold ${selectedCharacter === name ? 'btn-active' : 'text-slate-400'}`}>{name}</button>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 items-start">
                        {/* Control Area */}
                        <div className="lg:col-span-7 space-y-4">
                            <div className="flex flex-wrap gap-2 items-center">
                                <div className="flex retro-table p-0.5">
                                    <button onClick={() => setInputMode("current")} className={`px-3 py-1 text-[11px] font-bold ${inputMode === "current" ? "btn-active" : ""}`}>① 現在</button>
                                    <button onClick={() => setInputMode("target")} className={`px-3 py-1 text-[11px] font-bold ${inputMode === "target" ? "btn-active" : ""}`}>② 目標</button>
                                </div>
                                <button onClick={handleImport} className="btn-base bg-emerald-900/40 text-emerald-400 border-emerald-900 font-bold hover:bg-emerald-900">素材読み込み</button>
                                <button onClick={handleCopyBookmarklet} className="btn-base bg-slate-800 text-slate-300 border-slate-600 font-bold hover:bg-slate-700">
                                    {copied ? "コピー完了!" : "ブックマークレットをコピー"}
                                </button>
                            </div>

                            <div className="retro-table overflow-hidden">
                                <div className="retro-header">PROGRESS SETTINGS</div>
                                <div className="p-4 space-y-4">
                                    {[
                                        { label: "ARCARUM STONE", ids: [1, 2, 3, 4, 5, 6, 7] },
                                        { label: "EVOCATOR", ids: [8, 9, 10, 11, 12, 23, 24] },
                                        { label: "NEW WORLD WEAPON", ids: [13, 14, 15, 16, 17, 18] },
                                        { label: "DOMAIN", ids: [19, 20, 21, 22] }
                                    ].map(row => (
                                        <div key={row.label}>
                                            <div className="text-[9px] font-bold text-slate-500 mb-1.5 tracking-widest">{row.label}</div>
                                            <div className="grid grid-cols-4 sm:grid-cols-7 gap-1">
                                                {row.ids.map(i => {
                                                    const val = parseInt(i);
                                                    const isDone = val <= start;
                                                    const isActive = val > start && val <= end;
                                                    return (
                                                        <button key={i} onClick={() => {
                                                            if (inputMode === "current") { setStart(val); if (val >= end) setEnd(Math.min(val + 1, 24)); }
                                                            else { if (val <= start) setStart(val - 1); setEnd(val); }
                                                        }} className={`btn-base h-8 font-bold ${isDone ? 'btn-done' : isActive ? 'btn-active' : 'opacity-25'}`}>
                                                            {rawData.段階一覧[i.toString()].replace(/^(石|キャラ|武器)/, '')}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                    <div className="pt-2 flex justify-between items-center text-[10px] opacity-50 italic">
                                        <span>Click to toggle mode & stage.</span>
                                        <button onClick={() => { if (confirm("全リセットしますか？")) { setStart(0); setEnd(24); setInventory({}); } }} className="text-red-400 underline font-bold uppercase not-italic">Reset All</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* List Area */}
                        <div className="lg:col-span-5">
                            <div className="retro-table flex flex-col max-h-[750px]">
                                <div className="retro-header flex justify-between items-center">
                                    <span>INVENTORY CHECK</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => handleExport(false)} className="btn-base text-[9px] font-normal py-0">全部出力</button>
                                        <button onClick={() => handleExport(true)} className="btn-base border-rose-900 text-rose-400 text-[9px] font-normal py-0">不足のみ出力</button>
                                    </div>
                                </div>
                                <div className="p-3 bg-slate-900/50 border-b border-slate-800">
                                    <div className="font-black text-slate-100 text-[13px]">{selectedCharacter}</div>
                                    <div className="text-[10px] text-slate-500 font-bold uppercase">{rawData.段階一覧[start] || "未着手"} → {rawData.段階一覧[end]}</div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2">
                                    {MaterialTable({ items: summary })}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Image Export Area */}
                    <div id="hidden-export-container">
                        <div className="border-b-4 border-slate-700 pb-8 mb-10">
                            <h1 className="text-5xl font-black uppercase tracking-tighter mb-2 text-white">{selectedCharacter}</h1>
                            <div className="flex justify-between items-end">
                                <p className="text-xl font-bold text-slate-400">
                                    {exportShortage ? '【不足素材リスト】' : '【全素材リスト】'}
                                    <span className="ml-4">{rawData.段階一覧[start] || "START"} ➔ {rawData.段階一覧[end]}</span>
                                </p>
                                <span className="text-sm opacity-30 num-font">{new Date().toLocaleDateString()}</span>
                            </div>
                        </div>
                        {MaterialTable({ items: summary, isExport: true, onlyShortage: exportShortage })}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
